trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'codealpha-portfolio'

steps:

- task: Docker@2
  displayName: Build Docker Image
  inputs:
    command: build
    Dockerfile: Dockerfile
    repository: $(imageName)
    tags: latest

- script: |
    docker images
  displayName: Verify Docker Image